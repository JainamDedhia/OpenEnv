name: rocket-landing-env
version: "1.0.0"
spec_version: "1.0"
description: >
  Autonomous rocket landing environment where an LLM agent controls
  thrust to safely land a descending rocket.

tasks:
  - id: easy
    name: "Easy Landing"
    difficulty: "easy"
    max_steps: 15
    description: "Agent selects a valid and contextually appropriate action."
    grader: "tasks:task_easy"

  - id: medium
    name: "Medium Landing"
    difficulty: "medium"
    max_steps: 15
    description: "Agent applies height-aware and velocity-aware thrust decisions."
    grader: "tasks:task_medium"

  - id: hard
    name: "Hard Landing"
    difficulty: "hard"
    max_steps: 15
    description: "Agent handles engine failure, wind, low altitude simultaneously."
    grader: "tasks:task_hard"

  - id: fuel_management
    name: "Fuel Management"
    difficulty: "medium"
    max_steps: 15
    description: "Agent conserves fuel while maintaining safe descent velocity."
    grader: "tasks:task_fuel_management"

  - id: wind_compensation
    name: "Wind Compensation"
    difficulty: "medium"
    max_steps: 15
    description: "Agent compensates for high wind using stabilize and thrust decisions."
    grader: "tasks:task_wind_compensation"

  - id: precision_landing
    name: "Precision Landing"
    difficulty: "hard"
    max_steps: 15
    description: "Agent achieves precise near-ground velocity control for safe touchdown."
    grader: "tasks:task_precision_landing"

api:
  base_url: "https://unknownbrain-rocket-landing-openenv.hf.space"
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks

inference:
  script: inference.py
  runtime_limit_minutes: 20

docker:
  dockerfile: Dockerfile