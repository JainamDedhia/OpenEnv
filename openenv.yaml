name: rocket-landing-env
version: "2.0.0"
description: >
  A real-world-inspired autonomous rocket landing environment.
  An LLM agent controls thrust, stabilization, and emergency burns
  to safely land a descending rocket within a fixed step budget,
  under stochastic wind and engine-failure conditions.

author: Jainam Dedhia, Maher Dhami, Tirth Shah
license: MIT

environment:
  class: RocketLandingEnv
  module: environment

api:
  reset: /reset
  step:  /step
  state: /state
  tasks: /tasks

observation_space:
  type: object
  properties:
    height:
      type: number
      description: "Altitude of the rocket in metres"
    velocity:
      type: number
      description: "Vertical velocity (negative = descending)"
    fuel:
      type: number
      description: "Remaining fuel fraction [0, 1]"
    engine_status:
      type: string
      enum: [normal, failure]
    wind:
      type: number
      description: "Lateral wind speed in m/s"
    step:
      type: integer
      description: "Current step index"
    max_steps:
      type: integer
      description: "Total steps allowed per episode"
    last_action:
      type: string
      nullable: true

action_space:
  type: object
  properties:
    decision:
      type: string
      enum:
        - increase_thrust
        - decrease_thrust
        - maintain
        - stabilize
        - emergency_burn

reward:
  type: number
  range: [0.0, 1.0]
  description: >
    Per-step reward: weighted combination of altitude progress (40%),
    velocity quality (30%), fuel conservation (15%), and landing bonus (15%).
    Always strictly in [0.0, 1.0].

tasks:
  - name: easy
    description: "Agent selects a valid action from the action space."
    grader: task_easy
    module: tasks
    score_range: [0.0, 1.0]
    endpoint: /tasks/easy/run

  - name: medium
    description: "Agent applies height-aware and velocity-aware thrust decisions."
    grader: task_medium
    module: tasks
    score_range: [0.0, 1.0]
    endpoint: /tasks/medium/run

  - name: hard
    description: "Agent handles engine failure, wind, altitude, and velocity simultaneously."
    grader: task_hard
    module: tasks
    score_range: [0.0, 1.0]
    endpoint: /tasks/hard/run

inference:
  script: inference.py
  runtime_limit_minutes: 20
  resources:
    vcpu: 2
    memory_gb: 8

docker:
  dockerfile: Dockerfile